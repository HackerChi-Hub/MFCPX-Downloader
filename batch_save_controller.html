            // 等待用户操作
            setTimeout(() => {
                const success = confirm(`链接 ${index + 1} 已打开\\n\\n是否成功保存？\\n\\n点击"确定"=成功\\n点击"取消"=失败/需要验证码`);
                updateLinkStatus(index, success ? 'success' : 'failed', success ? '✅' : '❌');
                
                if (isRunning && !isPaused) {
                    currentIndex = index + 1;
                    setTimeout(processNext, 2000);
                }
                
                updateStats();
            }, 3000);
        }
        
        // 开始批量处理
        function startBatch() {
            if (!isRunning) {
                isRunning = true;
                isPaused = false;
                document.getElementById('status').textContent = '运行中...';
                currentIndex = links.findIndex((link, i) => {
                    const el = document.getElementById(`link-${i}`);
                    return el && !el.classList.contains('success');
                });
                
                if (currentIndex === -1) {
                    alert('✅ 所有链接已处理完成！');
                    return;
                }
                
                processNext();
            }
        }
        
        // 处理下一个
        function processNext() {
            if (!isRunning || isPaused) return;
            
            // 跳过已成功的
            while (currentIndex < links.length) {
                const el = document.getElementById(`link-${currentIndex}`);
                if (el && !el.classList.contains('success')) {
                    break;
                }
                currentIndex++;
            }
            
            if (currentIndex >= links.length) {
                isRunning = false;
                document.getElementById('status').textContent = '✅ 完成！';
                alert('✅ 批量保存完成！');
                return;
            }
            
            openLink(currentIndex);
            updateStats();
        }
        
        // 暂停
        function pauseBatch() {
            isPaused = !isPaused;
            document.getElementById('status').textContent = isPaused ? '已暂停' : '运行中...';
        }
        
        // 重置
        function resetAll() {
            if (!confirm('确定要重置所有进度吗？')) return;
            
            document.querySelectorAll('.link-item').forEach(el => {
                el.className = 'link-item pending';
                el.querySelector('.status-icon').textContent = '⏳';
            });
            
            currentIndex = 0;
            isRunning = false;
            isPaused = false;
            document.getElementById('status').textContent = '准备就绪';
            updateStats();
        }
        
        // 更新链接状态
        function updateLinkStatus(index, status, icon) {
            const el = document.getElementById(`link-${index}`);
            if (el) {
                el.className = `link-item ${status}`;
                el.querySelector('.status-icon').textContent = icon;
            }
        }
        
        // 更新统计
        function updateStats() {
            const items = document.querySelectorAll('.link-item');
            const total = items.length;
            const success = document.querySelectorAll('.link-item.success').length;
            const failed = document.querySelectorAll('.link-item.failed').length;
            const pending = document.querySelectorAll('.link-item.pending').length;
            const processing = document.querySelectorAll('.link-item.processing').length;
            
            document.getElementById('stats').textContent = 
                `总计: ${total} | 成功: ${success} | 失败: ${failed} | 待处理: ${pending + processing}`;
            
            const progress = ((success + failed) / total * 100).toFixed(1);
            document.getElementById('progressBar').style.width = `${progress}%`;
        }
        
        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
